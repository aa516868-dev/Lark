<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>費用申請單</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Serif TC','SimSun','宋体',serif; font-size:13px; background:#f5f5f5; color:#111; padding:16px; }
  .toolbar { display:flex; gap:8px; margin-bottom:14px; align-items:center; flex-wrap:wrap; }
  .btn { padding:6px 14px; font-size:12px; cursor:pointer; border:1px solid #999; border-radius:4px; background:#fff; color:#111; font-family:inherit; transition:background 0.15s; }
  .btn:hover { background:#e8e8e8; }
  .btn-primary { background:#1a6fdb; color:#fff; border-color:#1a6fdb; }
  .btn-primary:hover { background:#155ab5; }
  #status { font-size:12px; color:#555; }
  #status.error { color:#c0392b; }
  #status.ok { color:#1a7a3c; }
  .form-wrap { max-width:740px; background:#fff; border:1px solid #ccc; padding:28px 32px 32px; margin:0 auto; }
  .form-title { text-align:center; font-size:20px; font-weight:700; letter-spacing:3px; margin-bottom:20px; }
  table { width:100%; border-collapse:collapse; }
  td { border:1px solid #333; padding:6px 10px; vertical-align:top; line-height:1.7; }
  .label { font-weight:600; white-space:nowrap; background:#f0f0f0; width:110px; }
  .section-header { text-align:center; font-weight:700; letter-spacing:2px; background:#e0e0e0; padding:5px; }
  .value { min-height:26px; white-space:pre-wrap; word-break:break-word; }
  @media print {
    body { background:#fff; padding:0; }
    .toolbar { display:none; }
    .form-wrap { border:none; padding:0; max-width:100%; }
    td { border:1px solid #000 !important; }
    .label { background:#f0f0f0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .section-header { background:#e0e0e0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  }
</style>
</head>
<body>
<div class="toolbar">
  <button class="btn btn-primary" onclick="loadRecord()">⟳ 讀取已選取記錄</button>
  <button class="btn" onclick="window.print()">🖨 列印 / 匯出 PDF</button>
  <span id="status">請先在多維表格中點選一筆記錄，再按「讀取」。</span>
</div>
<div class="form-wrap">
  <div class="form-title">費用申請單</div>
  <table>
    <tr>
      <td class="label">报销人员</td><td class="value" id="f-reporter"></td>
      <td class="label">申请部门</td><td class="value" id="f-dept"></td>
    </tr>
    <tr>
      <td class="label">申请日期</td><td class="value" id="f-date"></td>
      <td class="label">申请地区</td><td class="value" id="f-region"></td>
    </tr>
    <tr><td class="section-header" colspan="4">審核詳細資料</td></tr>
    <tr>
      <td class="label">主旨</td><td class="value" id="f-subject" colspan="3"></td>
    </tr>
    <tr>
      <td class="label">付款货币</td><td class="value" id="f-currency"></td>
      <td class="label">申请金额</td><td class="value" id="f-amount"></td>
    </tr>
    <tr>
      <td class="label">内容说明</td><td class="value" id="f-desc" colspan="3" style="min-height:60px"></td>
    </tr>
    <tr><td class="section-header" colspan="4">費用處理紀錄</td></tr>
    <tr>
      <td class="label">审批人</td><td class="value" id="f-approver" colspan="3"></td>
    </tr>
    <tr>
      <td class="label">会计初审人员</td><td class="value" id="f-acc1"></td>
      <td class="label">会计复审人员</td><td class="value" id="f-acc2"></td>
    </tr>
    <tr>
      <td class="label">Finance / HR 下发</td><td class="value" id="f-hr"></td>
      <td class="label">财务付款人员</td><td class="value" id="f-payer"></td>
    </tr>
    <tr>
      <td class="label">付款日期</td><td class="value" id="f-paydate" colspan="3"></td>
    </tr>
  </table>
</div>
<script>
const FIELD_MAP = {
  '报销人员':          'f-reporter',
  '申请部门':          'f-dept',
  '申请日期':          'f-date',
  '申请地区':          'f-region',
  '主旨':              'f-subject',
  '付款货币':          'f-currency',
  '申请金额':          'f-amount',
  '内容说明':          'f-desc',
  '审批人':            'f-approver',
  '会计初审人员':      'f-acc1',
  '会计复审人员':      'f-acc2',
  'Finance / HR 下发': 'f-hr',
  '财务付款人员':      'f-payer',
  '付款日期':          'f-paydate',
};

const statusEl = document.getElementById('status');
function setStatus(msg, type='') { statusEl.textContent=msg; statusEl.className=type; }

function parseValue(val) {
  if (val===null||val===undefined) return '';
  if (typeof val==='number') return val.toLocaleString();
  if (typeof val==='string') return val;
  if (typeof val==='boolean') return val?'是':'否';
  if (Array.isArray(val)) {
    return val.map(item=>{
      if (typeof item==='string') return item;
      if (item&&typeof item==='object') {
        if (item.text!==undefined) return item.text;
        if (item.name!==undefined) return item.name;
        if (item.value!==undefined) return parseValue(item.value);
      }
      return '';
    }).filter(Boolean).join('\n');
  }
  if (typeof val==='object') {
    if (val.text!==undefined) return String(val.text);
    if (val.value!==undefined) return parseValue(val.value);
    if (val.name!==undefined) return String(val.name);
    if (val.timestamp!==undefined) return new Date(val.timestamp).toLocaleDateString('zh-TW');
  }
  return String(val);
}

async function loadRecord() {
  setStatus('讀取中…');
  try {
    // bitable 由 Lark 主端注入，不需要 import 或 CDN
    const bt = window.bitable;
    if (!bt) {
      setStatus('❌ 找不到 bitable，請確認是在多維表格「擴展腳本」中開啟，並重新整理。', 'error');
      return;
    }
    const selection = await bt.base.getSelection();
    if (!selection||!selection.recordId) {
      setStatus('⚠️ 請先在表格中點選一筆記錄。', 'error');
      return;
    }
    const table = await bt.base.getActiveTable();
    const fieldMetaList = await table.getFieldMetaList();
    const nameToId = {};
    fieldMetaList.forEach(f=>{ nameToId[f.name]=f.id; });
    const record = await table.getRecordById(selection.recordId);
    const cellValues = record.fields;

    Object.values(FIELD_MAP).forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=''; });

    let filled=0;
    for (const [fieldName, elId] of Object.entries(FIELD_MAP)) {
      const fieldId=nameToId[fieldName];
      if (!fieldId) continue;
      const text=parseValue(cellValues[fieldId]);
      const el=document.getElementById(elId);
      if (el&&text) { el.textContent=text; filled++; }
    }
    setStatus(filled===0?'⚠️ 沒有找到匹配欄位，請確認欄位名稱。':`✅ 已讀取 ${filled} 個欄位。`, filled===0?'error':'ok');
  } catch(err) {
    console.error(err);
    setStatus('❌ 錯誤：'+(err.message||String(err)), 'error');
  }
}

window.addEventListener('load', ()=>{ setTimeout(loadRecord, 500); });
</script>
</body>
</html>
